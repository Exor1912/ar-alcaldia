<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Alcaldia Chia - Final</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      /* UI de inicio obligatoria para navegadores móviles */
      #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
      button#startBtn { padding: 15px 40px; border-radius: 30px; border: none; background: #008f39; color: white; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,143,57,0.5); }
    </style>
  </head>
  <body>

    <div id="ui-overlay">
        <h2>Modernización Digital Chía</h2>
        <p>Escanea el quiosco para iniciar la experiencia</p>
        <button id="startBtn">ACTIVAR CÁMARA</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="./assets/video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <img id="iconBoton" src="./assets/icon.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 100; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-video id="arVideoEntity" src="#arVideo" width="1" height="1.5" position="0 0 0" rotation="0 0 0"></a-video>

        <a-entity id="goWebButton" class="clickable" position="0 -1.0 0.05">
          <a-plane width="1.2" height="0.3" color="#f79a0d" material="shader: flat; transparent: true; opacity: 0.9;" radius="0.1"></a-plane>
          <a-image src="#iconBoton" width="0.2" height="0.2" position="-0.45 0 0.01"></a-image>
          <a-text value="VER GESTIÓN COMPLETA" align="center" color="white" width="3.5" position="0.1 0 0.02" font="mozillavr"></a-text>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.getElementById('startBtn');
      const uiOverlay = document.getElementById('ui-overlay');
      const video = document.getElementById('arVideo');
      const goWebButton = document.getElementById('goWebButton');

      // 1. Manejo del botón de inicio (Play/Pause rápido para pre-cargar en iOS)
      startBtn.addEventListener('click', () => {
        video.play();
        video.pause(); 
        uiOverlay.style.display = 'none';
      });

      // 2. Lógica de reproducción automática al detectar/perder el objetivo
      const targetEntity = document.querySelector('[mindar-image-target]');
      targetEntity.addEventListener("targetFound", event => {
        console.log("Target Vertical detectado");
        video.play();
      });

      targetEntity.addEventListener("targetLost", event => {
        console.log("Target Vertical perdido");
        video.pause();
      });

      // 3. Lógica del botón interactivo
      goWebButton.addEventListener('click', event => {
        console.log("Clic en botón web");
        // Reemplaza por la URL real de la alcaldía
        window.open('https://www.alcaldiachia.gov.co/', '_blank');
      });
    </script>
  </body>
</html>
