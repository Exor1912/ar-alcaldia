<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>AR Alcaldia Final</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* UI Inicial */
      #ui-start { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
      #startBtn { padding: 15px 35px; border-radius: 30px; border: none; background: #008f39; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
      
      /* BOTÓN WEB INFALIBLE (HTML puro superpuesto) */
      #webButtonContainer { position: fixed; z-index: 1000; bottom: 40px; left: 50%; transform: translateX(-50%); display: none; width: 80%; text-align: center; }
      #goToWeb { padding: 15px 0; width: 100%; border-radius: 30px; border: none; background: #f79a0d; color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0px 5px 15px rgba(0,0,0,0.5); }
      
      /* Ocultar el botón VR a la fuerza */
      .a-enter-vr { display: none !important; }
    </style>
  </head>
  <body>

    <div id="ui-start">
        <button id="startBtn">ACTIVAR CÁMARA</button>
    </div>

    <div id="webButtonContainer">
        <button id="goToWeb">PAGAR PREDIAL AQUÍ</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="./assets/video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.8" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#arVideo');
      const startBtn = document.querySelector('#startBtn');
      const uiStart = document.querySelector('#ui-start');
      const webButtonContainer = document.querySelector('#webButtonContainer');
      const goToWeb = document.querySelector('#goToWeb');

      // Play inicial forzado
      startBtn.addEventListener('click', () => {
        video.play();
        video.pause(); 
        uiStart.style.display = 'none';
      });

      // Lógica de detección: Muestra/Oculta el botón HTML y el video
      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener("targetFound", () => {
        video.play();
        webButtonContainer.style.display = 'block'; // Aparece el botón 2D
      });
      target.addEventListener("targetLost", () => {
        video.pause();
        webButtonContainer.style.display = 'none'; // Desaparece el botón 2D
      });

      // Acción del botón HTML (Carga directa, sin fallos)
      goToWeb.addEventListener('click', () => {
        window.location.href = 'https://chia-cundinamarca.gov.co/web/2026/04/nueva-herramienta-digital-para-pago-de-predial-en-el-cam/';
      });
    </script>
  </body>
</html>
