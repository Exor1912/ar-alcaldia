<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { position: fixed; z-index: 1000; bottom: 20px; left: 50%; transform: translateX(-50%); }
      button { padding: 12px 25px; border-radius: 25px; border: none; background: #008f39; color: white; font-weight: bold; cursor: pointer; }
    </style>
  </head>
  <body>

    <div id="ui">
        <button id="startBtn">ACTIVAR EXPERIENCIA</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="./assets/video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <img id="iconBoton" src="./assets/icon.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-video id="arVideoEntity" src="#arVideo" width="1" height="1.5" position="0 0 0"></a-video>

        <a-entity id="goWebButton" class="clickable" position="0 -0.95 0.1">
          <a-plane width="1.2" height="0.25" color="#f79a0d" material="shader: flat;"></a-plane>
          <a-image src="#iconBoton" width="0.18" height="0.18" position="-0.45 0 0.01"></a-image>
          <a-text value="PAGAR PREDIAL AQUI" align="center" color="white" width="3.2" position="0.1 0 0.02"></a-text>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#arVideo');
      const startBtn = document.querySelector('#startBtn');
      const goWebButton = document.querySelector('#goWebButton');

      startBtn.addEventListener('click', () => {
        video.play();
        video.pause(); 
        document.getElementById('ui').style.display = 'none';
      });

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener("targetFound", () => video.play());
      target.addEventListener("targetLost", () => video.pause());

      // Redireccion a la pagina especifica del Predial
      goWebButton.addEventListener('click', () => {
        console.log("Redirigiendo a pago de predial...");
        window.location.href = 'https://chia-cundinamarca.gov.co/web/2026/04/nueva-herramienta-digital-para-pago-de-predial-en-el-cam/';
      });
    </script>
  </body>
</html>
